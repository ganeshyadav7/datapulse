name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Import application
        run: python -c "from app.main import app; print(app.title)"

      - name: Check formatting
        run: black --check app tests scripts

      - name: Check import order
        run: isort --check-only app tests scripts

      - name: Lint
        run: flake8 app tests scripts --max-line-length=100 --extend-ignore=E203,W503

      - name: Run tests
        run: python -m pytest --cov=app --cov-report=term-missing

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Build Docker image
        run: docker build -t datapulse-api .
